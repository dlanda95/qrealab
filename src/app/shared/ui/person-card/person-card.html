<article class="pc-card">

  <!-- Foto con forma de hoja -->
  <div class="pc-photo" [class.pc-photo--inverted]="inverted">
    @if (foto) {
      <div class="pc-photo__frame"
           [style.background-image]="'url(' + foto + ')'"
           [attr.aria-label]="nombre">
      </div>
    } @else {
      <div class="pc-photo__frame pc-photo__placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="pc-placeholder-icon">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
        </svg>
      </div>
    }
  </div>

  <!-- Info -->
  <div class="pc-info">
    <h3 class="pc-name">{{ nombre }}</h3>
    <p class="pc-role">{{ cargo }}</p>

    @if (linkedin) {
      <a [href]="linkedin"
         target="_blank"
         rel="noopener noreferrer"
         class="pc-linkedin"
         [attr.aria-label]="'LinkedIn de ' + nombre">
        <svg viewBox="0 0 24 24" fill="currentColor" class="pc-linkedin__icon">
          <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
          <rect x="2" y="9" width="4" height="12"/>
          <circle cx="4" cy="4" r="2"/>
        </svg>
      </a>
    }
  </div>

</article>
