<article class="card" [routerLink]="['/products', product.slug]" role="link" tabindex="0">

  <!-- Image -->
  <div class="card-image">
    @if (product.image) {
      <div class="card-image-bg"
           [style.background-image]="'url(' + product.image + ')'">
      </div>
    } @else {
      <div class="card-image-placeholder" aria-hidden="true">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <path d="M24 6 C24 6 38 14 38 26 C38 34.8 31.7 42 24 42 C16.3 42 10 34.8 10 26 C10 14 24 6 24 6Z"
                fill="rgba(46,198,67,0.15)" stroke="rgba(46,198,67,0.4)" stroke-width="1.5"/>
        </svg>
      </div>
    }

    @if (product.featured) {
      <span class="card-badge">Destacado</span>
    }
  </div>

  <!-- Body -->
  <div class="card-body">
    <span class="card-category">{{ product.category.name }}</span>
    <h3 class="card-name">{{ product.name }}</h3>

    @if (product.tagline) {
      <p class="card-tagline">{{ product.tagline }}</p>
    }

    @if (product.activeIngredient) {
      <p class="card-ingredient">{{ product.activeIngredient }}</p>
    }

    <div class="card-footer">
      <span class="card-cta">
        {{ 'product.view' | t }}
        <svg class="card-arrow" width="15" height="15" viewBox="0 0 15 15" fill="none">
          <path d="M2 7.5h11M9 3.5l4 4-4 4" stroke="currentColor"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </div>
  </div>

</article>
