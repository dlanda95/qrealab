<div class="leaf-wrapper" [class.inverted]="inverted">

  <div class="leaf-glow-border"></div>

  <div class="leaf-mask">
    <div class="leaf-parallax" #leafParallax>
      @if (imageSrc) {
        <div class="leaf-media"
             [style.background-image]="'url(' + imageSrc + ')'">
        </div>
      }
    </div>

    @if (!imageSrc) {
      <div class="leaf-content">
        <ng-content></ng-content>
      </div>
    }
  </div>

</div>
