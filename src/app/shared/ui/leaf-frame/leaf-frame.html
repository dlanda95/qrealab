<div class="leaf-wrapper" [class.inverted]="inverted">

  <div class="leaf-glow-border"></div>

  <div class="leaf-mask">

    <!--
      VENTANA PARALLAX
      ─────────────────────────────────────────────────────────
      .leaf-parallax es el "fondo" que se desliza detrás de la hoja.
      Siempre está en el DOM (no dentro de @if) para que @ViewChild
      lo encuentre de forma confiable, incluso cuando imageSrc
      llega async desde el CMS.

      .leaf-mask actúa como la "ventana": overflow:hidden recorta
      todo lo que sobresale de la forma de hoja.
      JS aplica translateY directamente → la imagen se desliza dentro
      de la ventana creando el efecto parallax de profundidad.
      ─────────────────────────────────────────────────────────
    -->
    <div class="leaf-parallax" #leafParallax>
      @if (imageSrc) {
        <div class="leaf-media"
             [style.background-image]="'url(' + imageSrc + ')'">
        </div>
      }
    </div>

    @if (!imageSrc) {
      <div class="leaf-content">
        <ng-content></ng-content>
      </div>
    }

  </div>

</div>
