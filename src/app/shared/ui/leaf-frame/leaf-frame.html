<div class="leaf-wrapper" [ngClass]="{'inverted': inverted}">
  
  <div class="leaf-glow-border"></div>

  <div class="leaf-mask">
    
    <div *ngIf="imageSrc" 
         class="leaf-media" 
         [style.background-image]="'url(' + imageSrc + ')'">
    </div>

    <div *ngIf="!imageSrc" class="leaf-content">
      <ng-content></ng-content>
    </div>
    
  </div>

</div>
