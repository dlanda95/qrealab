<div class="leaf-container" 
         [ngClass]="{'has-image': !!imageSrc, 'inverted': inverted}"
         [style.border-radius]="borderRadius">
      
      <img *ngIf="imageSrc" [src]="imageSrc" [alt]="altText" class="leaf-image" />

      <div class="leaf-content" *ngIf="!imageSrc">
        <ng-content></ng-content>
      </div>

      <div class="leaf-border-overlay"></div>
    </div>
