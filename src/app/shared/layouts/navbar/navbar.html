<nav class="navbar" [class.scrolled]="isScrolled()">
  <div class="navbar-container">

    <a routerLink="/" class="navbar-logo">
      <img
        src="assets/images/logo-white.png"
        alt="Qrealab"
        class="logo-img"
      />
    </a>

    <div class="navbar-links desktop-menu">
      @for (item of nav.settings().items; track item.ruta) {
        <a [routerLink]="item.ruta" routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: item.ruta === '/' }">
          {{ item.etiqueta }}
        </a>
      }

      <div class="navbar-actions">
        <div class="lang-switch">
          <button [class.active]="lang.currentLang() === 'es'" (click)="lang.setLanguage('es')">ES</button>
          <button [class.active]="lang.currentLang() === 'en'" (click)="lang.setLanguage('en')">EN</button>
        </div>
        <button class="btn-contact" (click)="modal.open()">{{ nav.settings().ctaLabel }}</button>
      </div>
    </div>

    <button class="mobile-toggle" (click)="toggleMobileMenu()" aria-label="Abrir menú">
     <lucide-icon name="menu" class="icon-stroke"></lucide-icon>
    </button>
  </div>
</nav>

<div class="mobile-menu-overlay" [class.open]="isMobileMenuOpen()">

  <button class="close-btn" (click)="toggleMobileMenu()" aria-label="Cerrar menú">
    <lucide-icon name="x" class="icon-stroke"></lucide-icon>
  </button>

  <div class="mobile-menu-content">
    @for (item of nav.settings().items; track item.ruta) {
      <a [routerLink]="item.ruta" (click)="toggleMobileMenu()">{{ item.etiqueta }}</a>
    }
    <button class="highlight" (click)="toggleMobileMenu(); modal.open()">{{ nav.settings().ctaLabel }}</button>

    <div class="mobile-lang">
      <div class="lang-switch">
        <button [class.active]="lang.currentLang() === 'es'" (click)="lang.setLanguage('es')">ES</button>
        <button [class.active]="lang.currentLang() === 'en'" (click)="lang.setLanguage('en')">EN</button>
      </div>
    </div>
  </div>
</div>
