<app-section-wrapper backgroundColor="white" waveBottom="to-gray">
  <div class="mv-grid">

    <!-- Misión -->
    <div class="mv-card mv-card--mision"
         data-aos="fade-up" data-aos-duration="600">
      <div class="mv-card__icon">
        <lucide-icon [name]="cfg().misionIcono" [size]="28"></lucide-icon>
      </div>
      <h2 class="mv-card__title">{{ cfg().misionTitulo }}</h2>
      <p class="mv-card__text">{{ cfg().misionTexto }}</p>
    </div>

    <!-- Visión -->
    <div class="mv-card mv-card--vision"
         data-aos="fade-up" data-aos-delay="150" data-aos-duration="600">
      <div class="mv-card__icon">
        <lucide-icon [name]="cfg().visionIcono" [size]="28"></lucide-icon>
      </div>
      <h2 class="mv-card__title">{{ cfg().visionTitulo }}</h2>
      <p class="mv-card__text">{{ cfg().visionTexto }}</p>
    </div>

  </div>
</app-section-wrapper>
