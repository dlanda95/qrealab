<section class="hero-container">
  
  <div class="hero-bg">
    <img [src]="imageSrc" alt="Qrealab Background" loading="eager">
  </div>

  <div class="hero-overlay"></div>

  <div class="hero-content">
    <div class="animate-fade-up">
      <span class="hero-tag">Innovación Farmacéutica</span>
      <h1 class="hero-title">
        <span [innerHTML]="title"></span>
      </h1>
      <p class="hero-subtitle">{{ subtitle }}</p>
      
      <div class="hero-actions">
        <button class="btn-primary-apple" (click)="scrollToContent()">
          {{ ctaText }}
        </button>
      </div>
    </div>
  </div>

  <div class="hero-curve">
    <svg viewBox="0 0 1440 120" preserveAspectRatio="none">
      <path d="M0,0 C480,100 960,100 1440,0 L1440,120 L0,120 Z" fill="#ffffff"></path>
    </svg>
  </div>

</section>
