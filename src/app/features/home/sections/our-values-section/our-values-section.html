@if (section(); as s) {
  <app-section-wrapper backgroundColor="white">
    <div class="ov-section">

      <!-- ── Header centrado ─────────────────────────────────── -->
      <header class="ov-header">
        <span class="ov-eyebrow">Lo que nos define</span>
        <h2 class="ov-title">{{ s.sectionTitle }}</h2>
      </header>

      <!-- ── Imagen + tarjetas ─────────────────────────────────── -->
      <div class="ov-body">

        @if (s.image) {
          <div class="ov-image-col" aria-hidden="true">
            <app-leaf-frame [imageSrc]="s.image" [inverted]="false"></app-leaf-frame>
          </div>
        }

        <div class="ov-cards" [class.no-image]="!s.image">
          @for (value of s.values; track $index) {
            <article class="ov-card">

              <div class="ov-card__icon">
                <lucide-icon [name]="value.icon" class="ov-icon-svg"></lucide-icon>
              </div>

              <div class="ov-card__body">
                <h3 class="ov-card__title">{{ value.title }}</h3>

                <ul class="ov-card__points">
                  @for (point of value.points; track $index) {
                    <li>
                      <!-- Wrapper único → strong + span son un solo flex-child,
                           la segunda línea alinea bajo la primera letra del texto -->
                      <p class="ov-point-text">
                        <strong>{{ point.label }}</strong>
                        @if (point.description) {<span>: {{ point.description }}</span>}
                      </p>
                    </li>
                  }
                </ul>
              </div>

            </article>
          }
        </div>

      </div>
    </div>
  </app-section-wrapper>
}
