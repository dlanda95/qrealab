@if (section(); as s) {
  <app-section-wrapper backgroundColor="white">

    <!--
      Usa app-split-section como base → mismo grid 1fr 1fr,
      mismo gap, misma posición que Nuestra Historia / Quiénes Somos.
      imagePosition="right" → hoja izquierda, contenido derecha (zigzag).
      Las tarjetas se proyectan via ng-content dentro del text-column.
    -->
    <app-split-section
      eyebrow="Lo que nos define"
      [title]="s.sectionTitle"
      [imageSrc]="s.image ?? ''"
      imagePosition="right"
      [leafInverted]="false">

      <!-- Grid de tarjetas de valores (slot ng-content del split-section) -->
      <div class="ov-cards"
           [class.ov-cards--even]="s.values.length === 4">
        @for (value of s.values; track $index) {
          <article class="ov-card">

            <div class="ov-card__icon">
              <lucide-icon [name]="value.icon" class="ov-icon-svg"></lucide-icon>
            </div>

            <div class="ov-card__body">
              <h3 class="ov-card__title">{{ value.title }}</h3>

              <ul class="ov-card__points">
                @for (point of value.points; track $index) {
                  <li>
                    <p class="ov-point-text">
                      <strong>{{ point.label }}</strong>
                      @if (point.description) {<span>: {{ point.description }}</span>}
                    </p>
                  </li>
                }
              </ul>
            </div>

          </article>
        }
      </div>

    </app-split-section>
  </app-section-wrapper>
}
