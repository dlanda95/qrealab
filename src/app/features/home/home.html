

<qrl-hero-carousel *ngIf="heroSlides.length > 0" [slides]="heroSlides"></qrl-hero-carousel>

<app-section-wrapper *ngIf="storyData" backgroundColor="white">
  <app-split-section
    [title]="storyData.title"
    [description]="storyData.description"
    [imageSrc]="storyData.image"
    imagePosition="right"
    [leafInverted]="false">
  </app-split-section>
</app-section-wrapper>

<app-section-wrapper *ngIf="whoweareData" backgroundColor="gray">
  <app-split-section
    [title]="whoweareData.title"
    [description]="whoweareData.description"
    [imageSrc]="whoweareData.image"
    imagePosition="left"
    [leafInverted]="true">
  </app-split-section>
</app-section-wrapper>
