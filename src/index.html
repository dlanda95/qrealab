<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Qrealab</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    #qrl-preloader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f5f8ff;
      transition: opacity 0.6s cubic-bezier(0.4,0,0.2,1),
                  visibility 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    #qrl-preloader.hide {
      opacity: 0;
      visibility: hidden;
    }

    /* ── Centro ─────────────────────────────────────────────── */
    .qrl-pre-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* ── Anillo + logo ───────────────────────────────────────── */
    .qrl-pre-ring {
      position: relative;
      width: 136px;
      height: 136px;
      animation: qrl-scalein 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    .qrl-pre-ring svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .qrl-pre-track { opacity: 0.12; }
    .qrl-pre-arc   { animation: qrl-spin 1.6s cubic-bezier(0.45,0.05,0.55,0.95) infinite; transform-origin: 68px 68px; }
    .qrl-pre-glow  { animation: qrl-spin 1.6s cubic-bezier(0.45,0.05,0.55,0.95) infinite; transform-origin: 68px 68px; filter: blur(4px); opacity: 0.35; }
    .qrl-pre-logo {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 72px;
      height: 72px;
      object-fit: contain;
      animation: qrl-logoin 0.5s 0.3s ease both;
    }

    /* ── Nombre empresa ──────────────────────────────────────── */
    .qrl-pre-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.28em;
      color: #1a3a8f;
      text-transform: uppercase;
      opacity: 0;
      animation: qrl-fadein 0.5s 0.5s ease forwards;
    }

    /* ── Barra de progreso ───────────────────────────────────── */
    .qrl-pre-bar-wrap {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(26,58,143,0.08);
    }
    .qrl-pre-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #1a3a8f 0%, #2060c8 60%, #2EC643 100%);
      animation: qrl-progress 2.5s cubic-bezier(0.4,0,0.2,1) forwards;
      border-radius: 0 2px 2px 0;
    }

    /* ── Keyframes ───────────────────────────────────────────── */
    @keyframes qrl-scalein {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes qrl-logoin {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes qrl-fadein {
      to { opacity: 1; }
    }
    @keyframes qrl-spin {
      to { transform: rotate(360deg); }
    }
    @keyframes qrl-progress {
      0%   { width: 0%; }
      60%  { width: 75%; }
      85%  { width: 88%; }
      100% { width: 98%; }
    }
  </style>
</head>
<body>
  <div id="qrl-preloader">
    <div class="qrl-pre-center">
      <div class="qrl-pre-ring">
        <svg viewBox="0 0 136 136" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Track -->
          <circle class="qrl-pre-track" cx="68" cy="68" r="62" stroke="#1a3a8f" stroke-width="5"/>
          <!-- Glow (duplicado desenfocado para el halo) -->
          <circle class="qrl-pre-glow" cx="68" cy="68" r="62"
            stroke="url(#qrl-g1)" stroke-width="5" stroke-linecap="round"
            stroke-dasharray="260 130"/>
          <!-- Arco principal -->
          <circle class="qrl-pre-arc" cx="68" cy="68" r="62"
            stroke="url(#qrl-g1)" stroke-width="5" stroke-linecap="round"
            stroke-dasharray="260 130"/>
          <defs>
            <linearGradient id="qrl-g1" x1="136" y1="68" x2="0" y2="68" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#2EC643"/>
              <stop offset="100%" stop-color="#1a3a8f"/>
            </linearGradient>
          </defs>
        </svg>
        <img src="assets/images/logo-q.png" class="qrl-pre-logo" alt="Qrealab">
      </div>
      <div class="qrl-pre-name">QREALAB</div>
    </div>
    <div class="qrl-pre-bar-wrap">
      <div class="qrl-pre-bar"></div>
    </div>
  </div>

  <app-root></app-root>

  <script>
    // Tiempo mínimo de 2.5 s para que la animación sea visible
    window.__qrlPreloaderStart = Date.now();
    window.__qrlHidePreloader = function() {
      var MIN = 2500;
      var elapsed = Date.now() - window.__qrlPreloaderStart;
      var wait = Math.max(0, MIN - elapsed);
      setTimeout(function() {
        var el = document.getElementById('qrl-preloader');
        if (el) {
          el.classList.add('hide');
          setTimeout(function() { el.remove(); }, 650);
        }
      }, wait);
    };
  </script>
</body>
</html>
