<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Qrealab</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    #qrl-preloader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      transition: opacity 0.45s ease, visibility 0.45s ease;
    }
    #qrl-preloader.hide {
      opacity: 0;
      visibility: hidden;
    }
    .qrl-pre-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      animation: qrl-fadein 0.5s ease forwards;
    }
    .qrl-pre-ring {
      position: relative;
      width: 96px;
      height: 96px;
    }
    .qrl-pre-ring svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      animation: qrl-spin 1.4s linear infinite;
    }
    .qrl-pre-logo {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 52px;
      height: 52px;
      object-fit: contain;
      animation: qrl-pulse 2s ease-in-out infinite;
    }
    .qrl-pre-dots {
      display: flex;
      gap: 8px;
    }
    .qrl-pre-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #1a3a8f;
      animation: qrl-dot 1.4s ease-in-out infinite;
    }
    .qrl-pre-dots span:nth-child(2) { animation-delay: 0.18s; background: #2060c8; }
    .qrl-pre-dots span:nth-child(3) { animation-delay: 0.36s; background: #2EC643; }

    @keyframes qrl-fadein {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes qrl-spin {
      to { transform: rotate(360deg); }
    }
    @keyframes qrl-pulse {
      0%, 100% { opacity: 1;    transform: scale(1); }
      50%       { opacity: 0.75; transform: scale(0.94); }
    }
    @keyframes qrl-dot {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40%           { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="qrl-preloader">
    <div class="qrl-pre-inner">
      <div class="qrl-pre-ring">
        <!-- Anillo azul→verde giratorio con track suave -->
        <svg viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="48" cy="48" r="44" stroke="#e8eef8" stroke-width="4"/>
          <circle cx="48" cy="48" r="44"
            stroke="url(#qrl-grad)"
            stroke-width="4"
            stroke-linecap="round"
            stroke-dasharray="207 69"
            stroke-dashoffset="0"/>
          <defs>
            <linearGradient id="qrl-grad" x1="96" y1="48" x2="0" y2="48" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#2EC643"/>
              <stop offset="100%" stop-color="#1a3a8f"/>
            </linearGradient>
          </defs>
        </svg>
        <img src="assets/images/logo-q.png" class="qrl-pre-logo" alt="Qrealab">
      </div>
      <div class="qrl-pre-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <app-root></app-root>

  <script>
    // Llamado desde AppComponent.ngOnInit para salir con fade suave
    window.__qrlHidePreloader = function() {
      var el = document.getElementById('qrl-preloader');
      if (el) {
        el.classList.add('hide');
        setTimeout(function() { el.remove(); }, 500);
      }
    };
  </script>
</body>
</html>
